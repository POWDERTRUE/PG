<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spherified Cube & Tangent Mapping Visualizer</title>
    <style>
        body { margin: 0; background: #000; color: #00ffcc; font-family: monospace; overflow: hidden; }
        canvas { display: block; }
        #ui { position: absolute; top: 10px; left: 10px; background: rgba(0,20,30,0.8); padding: 15px; border: 1px solid #00ffcc; border-radius: 8px; }
        h1 { margin: 0 0 10px 0; font-size: 16px; letter-spacing: 1px; color:#fff; }
        label { display: block; margin-top: 10px; font-size: 12px; }
        select, input[type=range] { width: 100%; margin-top: 5px; background: #001020; color: #00ffcc; border: 1px solid #00ffcc; }
        .legend { margin-top: 15px; font-size: 11px; color: #aaa; }
    </style>
    <!-- Incluir Three.js desde CDN para la demo aislada -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

<div id="ui">
    <h1>OMEGA V30 - Terrain Visualizer</h1>
    <label>Mapping Mode:
        <select id="modeSelect">
            <option value="tangent">Tangent (Nowell) Spherified Cube</option>
            <option value="standard">Standard Normalized Cube</option>
            <option value="raw">Raw Cube</option>
        </select>
    </label>
    
    <label>Subdivisions (Segments): <span id="segVal">32</span>
        <input type="range" id="segRange" min="4" max="64" step="2" value="32">
    </label>

    <label>Fractal Noise Amplitude: <span id="noiseVal">0.10</span>
        <input type="range" id="noiseRange" min="0" max="0.5" step="0.01" value="0.10">
    </label>
    
    <div class="legend">
        Gire la cámara con el ratón.<br>
        Rojo: Cara +X | Verde: Cara +Y | Azul: Cara +Z<br>
        (Aplica wireframe para ver la distribución de área)
    </div>
</div>

<script>
    // --- MATEMÁTICA COPIADA EXACTA DEL WORKER ---
    function hash3D(x, y, z) {
        let h = (x * 1619 + y * 31337 + z * 6971) & 0xFFFFFFFF;
        h = (h ^ (h >>> 16)) * 0x85ebca6b;
        h = (h ^ (h >>> 13)) * 0xc2b2ae35;
        return ((h ^ (h >>> 16)) >>> 0) / 4294967296.0;
    }
    function fade(t) { return t * t * t * (t * (t * 6 - 15) + 10); }
    function lerp(t, a, b) { return a + t * (b - a); }
    function noise3D(x, y, z) {
        let X = Math.floor(x), Y = Math.floor(y), Z = Math.floor(z);
        x -= X; y -= Y; z -= Z;
        const u = fade(x), v = fade(y), w = fade(z);
        const n000 = hash3D(X, Y, Z), n100 = hash3D(X+1, Y, Z);
        const n010 = hash3D(X, Y+1, Z), n110 = hash3D(X+1, Y+1, Z);
        const n001 = hash3D(X, Y, Z+1), n101 = hash3D(X+1, Y, Z+1);
        const n011 = hash3D(X, Y+1, Z+1), n111 = hash3D(X+1, Y+1, Z+1);
        return lerp(w, lerp(v, lerp(u, n000, n100), lerp(u, n010, n110)),
                       lerp(v, lerp(u, n001, n101), lerp(u, n011, n111))) * 2.0 - 1.0;
    }
    function fbm3D(x, y, z, octaves = 6, persistence = 0.5, lacunarity = 2.0) {
        let total = 0, amplitude = 1.0, frequency = 1.0, maxValue = 0;
        for (let i = 0; i < octaves; i++) {
            total += noise3D(x * frequency, y * frequency, z * frequency) * amplitude;
            maxValue += amplitude; amplitude *= persistence; frequency *= lacunarity;
        }
        return total / maxValue;
    }
    function mapCubeToSphere(cx, cy, cz) {
        const x2 = cx*cx, y2 = cy*cy, z2 = cz*cz;
        const x = cx * Math.sqrt(1.0 - y2*0.5 - z2*0.5 + (y2*z2)/3.0);
        const y = cy * Math.sqrt(1.0 - x2*0.5 - z2*0.5 + (x2*z2)/3.0);
        const z = cz * Math.sqrt(1.0 - x2*0.5 - y2*0.5 + (x2*y2)/3.0);
        return {x, y, z};
    }
    function mapStandard(cx, cy, cz) {
        const len = Math.sqrt(cx*cx + cy*cy + cz*cz);
        return { x: cx/len, y: cy/len, z: cz/len };
    }

    // --- SETUP VISUALIZADOR ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 100);
    camera.position.set(2.5, 2.5, 3.5);
    
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);
    
    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // Ejes
    const axesHelper = new THREE.AxesHelper( 2 );
    scene.add( axesHelper );

    // Generar las 6 caras (Meshes independientes)
    let planetGroup = new THREE.Group();
    scene.add(planetGroup);

    const faceColors = [0xff4444, 0x990000, 0x44ff44, 0x009900, 0x4444ff, 0x000099];
    const faceNormals = [
        {x:1, y:0, z:0}, {x:-1, y:0, z:0},
        {x:0, y:1, z:0}, {x:0, y:-1, z:0},
        {x:0, y:0, z:1}, {x:0, y:0, z:-1}
    ];

    let segments = 32;
    let mode = 'tangent';
    let noiseAmp = 0.10;

    function buildPlanet() {
        // Remover meshes viejos
        while(planetGroup.children.length > 0) {
            const m = planetGroup.children[0];
            m.geometry.dispose();
            m.material.dispose();
            planetGroup.remove(m);
        }

        const radius = 1.0;

        for (let f = 0; f < 6; f++) {
            const geom = new THREE.PlaneGeometry(2, 2, segments, segments);
            const pos = geom.attributes.position.array;
            const norm = faceNormals[f];

            // Ejes locales
            const axisA = [norm.y, norm.z, norm.x];
            const axisB = [norm.z, norm.x, norm.y];

            for (let i=0; i<pos.length; i+=3) {
                // Plane local coord (-1 a 1 porque size es 2)
                const localX = pos[i];
                const localY = pos[i+1];

                const cx = norm.x + (localX * axisA[0]) + (localY * axisB[0]);
                const cy = norm.y + (localX * axisA[1]) + (localY * axisB[1]);
                const cz = norm.z + (localX * axisA[2]) + (localY * axisB[2]);

                let sphereP;
                if (mode === 'tangent') {
                    sphereP = mapCubeToSphere(cx, cy, cz);
                } else if (mode === 'standard') {
                    sphereP = mapStandard(cx, cy, cz);
                } else {
                    sphereP = {x:cx, y:cy, z:cz}; // Raw Cube
                }

                // Noise Layer
                const nDist = fbm3D(sphereP.x*1.5, sphereP.y*1.5, sphereP.z*1.5, 6);
                let currentRadius = radius;
                if (mode !== 'raw') {
                    currentRadius += (nDist * noiseAmp);
                } else {
                    currentRadius = 1.0; 
                }

                pos[i] = sphereP.x * currentRadius;
                pos[i+1] = sphereP.y * currentRadius;
                pos[i+2] = sphereP.z * currentRadius;
            }

            geom.computeVertexNormals();

            const mat = new THREE.MeshBasicMaterial({ color: faceColors[f], wireframe: true });
            const mesh = new THREE.Mesh(geom, mat);
            planetGroup.add(mesh);
        }
    }

    buildPlanet();

    // UI listeners
    document.getElementById('modeSelect').addEventListener('change', (e) => { mode = e.target.value; buildPlanet(); });
    document.getElementById('segRange').addEventListener('input', (e) => { 
        segments = parseInt(e.target.value); 
        document.getElementById('segVal').innerText = segments;
        buildPlanet(); 
    });
    document.getElementById('noiseRange').addEventListener('input', (e) => { 
        noiseAmp = parseFloat(e.target.value); 
        document.getElementById('noiseVal').innerText = noiseAmp.toFixed(2);
        buildPlanet(); 
    });

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    animate();

</script>
</body>
</html>
