<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Powder Galaxy OMEGA V30</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; color: #fff; font-family: 'Courier New', monospace; user-select: none; }
        #pg-root { position: relative; width: 100vw; height: 100vh; }
        #pg-renderer { display: block; position: absolute; inset: 0; width: 100%; height: 100%; outline: none; touch-action: none; }
        .ui-layer { position: absolute; inset: 0; pointer-events: none; z-index: 10; }
        .interactive { pointer-events: none; z-index: 20; }
        #window-layer > *, #kernel-bar > * { pointer-events: auto; }

        /* ── Cursor: hidden in universe mode, visible in HUD mode ── */
        body:not(.pg-hud-mode),
        body:not(.pg-hud-mode) * { cursor: none !important; }
        body.pg-hud-mode        { cursor: default; }
        body.pg-game-paused,
        body.pg-game-paused * { cursor: default !important; }
        body.pg-game-paused button,
        body.pg-game-paused a,
        body.pg-game-paused input,
        body.pg-game-paused select,
        body.pg-game-paused textarea { cursor: pointer !important; }
        body.init-mode-active,
        body.init-mode-active * { cursor: default !important; }
        body.init-mode-active button,
        body.init-mode-active a,
        body.init-mode-active input,
        body.init-mode-active select,
        body.init-mode-active textarea { cursor: pointer !important; }
        /* UI elements always get pointer regardless of mode */
        body.pg-hud-mode [class*="glass-window"],
        body.pg-hud-mode [class*="os-window"],
        body.pg-hud-mode #kernel-bar,
        body.pg-hud-mode #hud-layer,
        body.pg-hud-mode button,
        body.pg-hud-mode input,
        body.pg-hud-mode a        { pointer-events: auto; cursor: pointer; }

        /* ── HUD toggle badge ── */
        #pg-hud-badge {
            position: fixed; bottom: 22px; right: 22px; z-index: 9000;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
            border: 1px solid rgba(0,255,204,0.3); border-radius: 6px;
            padding: 6px 14px; font-family: 'Courier New', monospace;
            font-size: 11px; letter-spacing: 2px; color: rgba(0,255,204,0.9);
            pointer-events: none;
            opacity: 0; transform: translateY(6px);
            transition: opacity 0.18s ease, transform 0.18s ease;
        }
        body.pg-hud-mode #pg-hud-badge {
            opacity: 1; transform: translateY(0);
        }
        body.pg-game-paused #pg-hud-badge {
            opacity: 0; transform: translateY(6px);
        }
    </style>


    <script type="importmap">
        {
          "imports": {
            "three": "https://unpkg.com/three@0.176.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.176.0/examples/jsm/",
            "three/examples/jsm/": "https://unpkg.com/three@0.176.0/examples/jsm/",
            "gsap": "https://esm.sh/gsap@3.14.2",
            "gsap/Draggable": "https://esm.sh/gsap@3.14.2/Draggable",
            "postprocessing": "https://unpkg.com/postprocessing@6.39.0/build/postprocessing.esm.js",
            "stats.js": "https://esm.sh/stats.js@0.17.0",
            "lil-gui": "https://esm.sh/lil-gui@0.21.0",
            "socket.io-client": "https://esm.sh/socket.io-client@4.8.1"
          }
        }
    </script>
  <script type="module" crossorigin src="/assets/index-Cc2TIbXn.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-CdJBPPZv.css">
</head>
<body>
    <div id="pg-root">
        <canvas id="pg-renderer"></canvas>
        <div id="hud-layer"    class="ui-layer"></div>
        <div id="window-layer" class="ui-layer interactive"></div>
        <div id="kernel-bar"   class="ui-layer interactive"></div>
    </div>
    <!-- HUD mode indicator -->
    <div id="pg-hud-badge">MODO HUD · TAB</div>

    <script>
        function showFatalError(message, detail) {
            console.error('[FATAL ERROR]', message, detail);
            let overlay = document.getElementById('fatal-error-overlay');
            if (!overlay) {
                overlay = document.createElement('div');
                overlay.id = 'fatal-error-overlay';
                overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.85);color:#ff6666;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:monospace;z-index:99999;padding:20px;';
                overlay.innerHTML = `<div style="max-width:900px;text-align:left;line-height:1.4;"><h1 style="margin:0 0 12px;">Powder Galaxy Boot Error</h1><p style="margin:0 0 12px;">${String(message)}</p><pre style="max-height:300px;overflow:auto;background:#111;padding:12px;border:1px solid #444;">${String(detail)}</pre></div>`;
                document.body.appendChild(overlay);
            }
        }

        window.onerror = function(msg, url, line, col, err) {
            showFatalError(`${msg} at ${url}:${line}:${col}`, err || 'unknown');
        };
        window.addEventListener('unhandledrejection', e => {
            showFatalError('Unhandled Promise Rejection', e.reason || e);
        });
    </script>
</body>
</html>
